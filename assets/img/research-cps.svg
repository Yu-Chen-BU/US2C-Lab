<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 372" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="718" height="370" rx="12" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="360" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1f1f1f">Anchored Trust for Cyber-Physical Systems</text>

  <!-- trust gate -->
  <rect x="248" y="64" width="224" height="74" rx="9" fill="#f7edf7" stroke="#B509AC" stroke-width="1.4"/>
  <text x="360" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#B509AC">Physical-anchoring trust layer</text>
  <text x="360" y="108" text-anchor="middle" font-size="9.5" fill="#7a1a72">ENF + multi-physics attestation</text>
  <text x="360" y="124" text-anchor="middle" font-size="9.5" fill="#7a1a72">mismatch &#8594; reject &amp; alert</text>

  <!-- physical system -->
  <rect x="46" y="214" width="240" height="78" rx="9" fill="#eaf3ec" stroke="#bcd9c2"/>
  <text x="166" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#2a2a2a">Physical CPS</text>
  <text x="166" y="264" text-anchor="middle" font-size="9.5" fill="#3a3a3a">smart grid · UAV swarm ·</text>
  <text x="166" y="277" text-anchor="middle" font-size="9.5" fill="#3a3a3a">sensors &amp; actuators</text>

  <!-- digital twin -->
  <rect x="434" y="214" width="240" height="78" rx="9" fill="#eef1f6" stroke="#cdd6e2"/>
  <text x="554" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#2a2a2a">Digital twin &amp; AI agents</text>
  <text x="554" y="264" text-anchor="middle" font-size="9.5" fill="#3a3a3a">virtual model · MCP-orchestrated</text>
  <text x="554" y="277" text-anchor="middle" font-size="9.5" fill="#3a3a3a">decisions</text>

  <!-- sensing path: physical -> gate -> twin -->
  <g stroke="#9a9a9a" stroke-width="1.7" fill="none">
    <path d="M166 214 L166 101 L242 101"/>
    <path d="M478 101 L554 101 L554 214"/>
  </g>
  <polygon points="248,101 238,96 238,106" fill="#9a9a9a"/>
  <polygon points="554,214 549,204 559,204" fill="#9a9a9a"/>
  <text x="200" y="92" font-size="10" fill="#7a7a7a" font-style="italic">sensed state</text>
  <text x="520" y="92" font-size="10" fill="#7a7a7a" font-style="italic" text-anchor="end">verified state</text>

  <!-- actuation path: twin -> physical -->
  <g stroke="#9a9a9a" stroke-width="1.7" fill="none">
    <path d="M554 292 L554 338 L166 338 L166 292"/>
  </g>
  <polygon points="166,292 161,302 171,302" fill="#9a9a9a"/>
  <text x="360" y="333" text-anchor="middle" font-size="10" fill="#7a7a7a" font-style="italic">actuation &amp; control</text>

  <!-- threat callout -->
  <rect x="40" y="150" width="196" height="40" rx="7" fill="#f7ecec" stroke="#dcc0c0"/>
  <text x="138" y="167" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9a3636">Threats on the sensing path</text>
  <text x="138" y="181" text-anchor="middle" font-size="9" fill="#7a3a3a">false data injection · spoofing · deepfake</text>
  <line x1="166" y1="150" x2="166" y2="138" stroke="#cf9a9a" stroke-width="1.4" stroke-dasharray="3 2"/>

  <text x="360" y="360" text-anchor="middle" font-size="10.5" font-style="italic" fill="#7a7a7a">P2V Trust — keeping the virtual model coupled to physical reality</text>
</svg>
